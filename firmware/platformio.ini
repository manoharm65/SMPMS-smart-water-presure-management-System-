; PlatformIO Project Configuration for SMPMS ESP32 Firmware
; Smart Pressure Management System - Edge Node

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial upload speed
upload_speed = 921600
monitor_speed = 115200

; Firmware version
build_flags =
    -D VERSION=\"1.0.0\"
    -D PRODUCT=\"SMPMS-ESP32\"

; WiFi settings (configured via EEPROM after registration)
; Network & Server
; - WificlientSecure for HTTPS support
; - WiFiClient for HTTP support (used for ESP API)
; - WiFi.h for network connectivity

; Libraries
lib_deps =
    WiFiClientSecure
    PubSubClient
    EEPROM
    Wire

; Optional: ESP32-specific features
board_build.partitions = default.csv
board_build.filesystem = littlefs

; Debug options
debug_tool = esp-prog
debug_build_flags = -DDEBUG_ESP

[env:esp32-release]
platform = espressif32
board = esp32dev
framework = arduino
release_build = yes
build_flags =
    -D VERSION=\"1.0.0\"
    -D PRODUCT=\"SMPMS-ESP32\"
    -D NDEBUG
upload_speed = 921600
monitor_speed = 115200
